<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daniel Moyo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <nav class="container" id="nav"></nav>
  </header>

  <main>
    <div class="container">
      <div class="filters" id="filters"></div>
      <div class="grid"    id="grid"></div>
    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footer-inner" id="footer"></div>
    </div>
  </footer>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <span class="lightbox-close" id="lb-close">Close ✕</span>
    <img id="lb-img" src="" alt="">
  </div>

  <script src="data.js"></script>
  <script>
    // ── Build Nav ──────────────────────────────────────────────
    const navEl = document.getElementById('nav');
    const logoA = document.createElement('a');
    logoA.href = 'index.html';
    logoA.className = 'logo';
    logoA.innerHTML = 'Daniel Moyo<span>Geologist · GIS &amp; Remote Sensing</span>';
    navEl.appendChild(logoA);

    const linksDiv = document.createElement('div');
    linksDiv.className = 'nav-links';
    SITE.nav.forEach(item => {
      const a = document.createElement('a');
      a.href = item.href;
      a.textContent = item.label;
      if (item.external) { a.target = '_blank'; a.rel = 'noopener'; a.className = 'external'; }
      if (item.href === 'index.html') a.classList.add('active');
      linksDiv.appendChild(a);
    });
    navEl.appendChild(linksDiv);

    // ── Build Filters ──────────────────────────────────────────
    const filtersEl = document.getElementById('filters');
    let activeFilter = 'All';

    SITE.categories.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (cat === 'All' ? ' active' : '');
      btn.textContent = cat;
      btn.addEventListener('click', () => {
        activeFilter = cat;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.card').forEach(card => {
          const match = cat === 'All' || card.dataset.category === cat;
          card.classList.toggle('hidden', !match);
        });
      });
      filtersEl.appendChild(btn);
    });

    // ── Build Grid ─────────────────────────────────────────────
    const gridEl = document.getElementById('grid');

    SITE.items.forEach((item, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.category = item.category;
      card.innerHTML = `
        <img src="${item.src}" alt="${item.title}" loading="lazy">
        <div class="card-overlay">
          <div class="card-title">${item.title}</div>
          <div class="card-tag">${item.category}</div>
        </div>
      `;
      card.addEventListener('click', () => openLightbox(item.src, item.title));
      gridEl.appendChild(card);
    });

    // ── Lightbox ───────────────────────────────────────────────
    const lightbox = document.getElementById('lightbox');
    const lbImg    = document.getElementById('lb-img');
    const lbClose  = document.getElementById('lb-close');

    function openLightbox(src, alt) {
      lbImg.src = src;
      lbImg.alt = alt;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
      lbImg.src = '';
    }

    lbClose.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    // ── Build Footer ───────────────────────────────────────────
    const footerEl = document.getElementById('footer');
    footerEl.innerHTML = `
      <span>© 2026 Daniel Moyo</span>
      <div class="footer-links">
        <a href="mailto:moyodanj@gmail.com">Email</a>
        <a href="https://www.linkedin.com/in/daniel-moyo-9000b8228/" target="_blank" rel="noopener">LinkedIn</a>
      </div>
    `;
  </script>
</body>
</html>
